name: Thanos Community Content

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:
    inputs:
      minimum_entries:
        description: 'Trim files when they reach at least this many array entries'
        required: false
        default: '100'
        type: string
      dry_run:
        description: 'Do not write changes; only report what would be trimmed'
        required: false
        type: boolean

permissions:
  actions: read
  contents: write
  pull-requests: write

concurrency:
  group: thanos-community-content
  cancel-in-progress: true

jobs:
  backup-guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.guard.outputs.should_run }}
    steps:
      - name: Decide whether backup run is needed
        id: guard
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            if (context.eventName !== 'schedule') {
              core.setOutput('should_run', 'true');
              return;
            }

            const maxAgeMs = 8 * 60 * 60 * 1000;
            const workflowId = 'thanos-community-content.yml';
            const now = Date.now();
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              event: 'workflow_dispatch',
              branch: 'main',
              per_page: 100,
            });
            const recentSuccess = runs.find(function(run) {
              if (run.status !== 'completed' || run.conclusion !== 'success') {
                return false;
              }
              return (now - Date.parse(run.created_at)) <= maxAgeMs;
            });

            core.setOutput('should_run', recentSuccess ? 'false' : 'true');

  prune-content:
    needs: backup-guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.repository == 'lingdojo/kana-dojo' && needs.backup-guard.outputs.should_run == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AUTOMATION_PR_TOKEN }}

      - name: Thanos snap oversized content files
        id: prune
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AUTOMATION_PR_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const contentDir = 'community/content';
            const minimumEntries = Number((context.payload.inputs && context.payload.inputs.minimum_entries) || 100);
            const dryRun = !!(context.payload.inputs && (context.payload.inputs.dry_run === true || context.payload.inputs.dry_run === 'true'));

            if (!Number.isInteger(minimumEntries) || minimumEntries <= 0) {
              throw new Error(`Invalid minimum_entries input: ${context.payload.inputs && context.payload.inputs.minimum_entries}`);
            }

            const changedFiles = [];
            const skippedFiles = [];
            let prunedCount = 0;

            for (const file of fs.readdirSync(contentDir).filter(function(name) { return name.endsWith('.json'); }).sort()) {
              const filePath = path.join(contentDir, file);
              const raw = fs.readFileSync(filePath, 'utf8');
              const data = JSON.parse(raw);

              if (!Array.isArray(data)) {
                skippedFiles.push(`${file} (not an array)`);
                continue;
              }

              if (data.length < minimumEntries) {
                skippedFiles.push(`${file} (${data.length} entries)`);
                continue;
              }

              const keepFrom = Math.floor(data.length / 2);
              const trimmed = data.slice(keepFrom);
              console.log(`Pruning ${file}: ${data.length} -> ${trimmed.length}`);
              changedFiles.push(filePath);
              prunedCount += 1;

              if (!dryRun) {
                fs.writeFileSync(filePath, JSON.stringify(trimmed, null, 2) + '\n');
              }
            }

            console.log(`Content prune summary: changed=${prunedCount}, minimum_entries=${minimumEntries}, dry_run=${dryRun}`);
            if (skippedFiles.length > 0) {
              console.log(`Skipped files: ${skippedFiles.join(', ')}`);
            }

            core.setOutput('dry_run', dryRun ? 'true' : 'false');
            core.setOutput('changed_files', changedFiles.join(' '));
            core.setOutput('changed_count', String(prunedCount));
            core.setOutput('needs_commit', !dryRun && prunedCount > 0 ? 'true' : 'false');

      - name: Commit content prune directly to main
        if: steps.prune.outputs.needs_commit == 'true'
        run: |
          git config user.name "てんとう虫"
          git config user.email "reservecrate@gmail.com"
          git add ${{ steps.prune.outputs.changed_files }}
          if git diff --cached --quiet; then
            echo "No content changes to commit"
            exit 0
          fi
          commit_msg="chore(automation): thanos community content"
          max_attempts=5
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            git commit -m "$commit_msg"
            if git pull --rebase origin main && git push origin HEAD:main; then
              echo "Content prune push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Content prune push attempt $attempt failed; retrying..."
            git rebase --abort || true
            git fetch origin main
            git reset --hard origin/main
            git add ${{ steps.prune.outputs.changed_files }}
            if git diff --cached --quiet; then
              echo "No content changes remain after sync"
              exit 0
            fi
            attempt=$((attempt + 1))
          done
          echo "Failed to push content prune updates after $max_attempts attempts"
          exit 1
